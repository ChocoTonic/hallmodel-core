name: parity

on:
  push:
    branches: [master]
  pull_request:

# Keep only the latest run per ref to minimize storage.
concurrency:
  group: parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-latest
    env:
      CC:  ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
      CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
    steps:
      - uses: actions/checkout@v7

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ${{ matrix.compiler }}

      # CMake FetchContent pulls nlohmann/json. Cache the resolved dep dir so
      # the second matrix job (and subsequent runs) skip the download.
      - name: Cache FetchContent _deps
        uses: actions/cache@v6
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-nlohmann-json-3.11.3

      - name: Run parity verification
        run: ./proof/verify.sh

      # No byte-diff against committed proof/outputs — the upstream contract's
      # tolerance (rtol=1e-9, atol=1e-12) is the canonical gate, not byte
      # equality. The committed proof/outputs/ are a same-platform snapshot
      # from the author's macOS arm64; CI's Ubuntu x86_64 produces last-ULP
      # different JSON. verify.sh's compare.py is what enforces parity.
